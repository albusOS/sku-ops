# docker-compose.override.yml — Docker-local development overrides.
#
# Docker Compose automatically merges this file when you run `docker compose up`
# from the project root. It is NOT loaded when you explicitly name the compose
# file (e.g. `docker compose -f docker-compose.yml up -d`).
#
# This file:
#   - Exposes db and backend ports to the host for debugging
#   - Defaults ENV to development (respects ENV set in root .env or shell)
#   - Moves nginx and certbot behind the `production-only` profile so they are
#     not started during local Docker runs
#
# IMPORTANT: ENV here uses ${ENV:-development} so that if your root .env sets
# ENV=production, it is respected. The app enforces hard guards in production
# (JWT_SECRET required, CORS locked, ALLOW_RESET forbidden).
#
# Docker-local workflow (dev):
#   cp .env.production.example .env && edit .env   # fill POSTGRES_PASSWORD, JWT_SECRET, CORS_ORIGINS
#   docker compose up
#
# VPS production (no override):
#   docker compose -f docker-compose.yml up -d
services:
  db:
    ports:
      - "5433:5432"

  backend:
    ports:
      - "8000:8000"
    environment:
      ENV: ${ENV:-development}

  nginx:
    profiles:
      - production-only

  certbot:
    profiles:
      - production-only
