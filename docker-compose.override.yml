# Development overrides — automatically loaded by `docker compose up`.
# Exposes Postgres and backend ports for local debugging.
# Production deployments use: docker compose -f docker-compose.yml up -d
# (which ignores this file).
services:
  db:
    ports:
      - "5433:5432"

  backend:
    ports:
      - "8000:8000"
    environment:
      ENV: development

  nginx:
    profiles:
      - production-only

  certbot:
    profiles:
      - production-only
