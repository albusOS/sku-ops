name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sku_ops_test
          POSTGRES_USER: sku_ops
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sku_ops"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true

      - name: Verify dev tools resolve from pixi
        run: pixi run doctor

      - name: Install backend virtualenv (uv + pixi Python)
        run: pixi run uv sync --dev --directory backend

      - name: Lint
        run: pixi run lint backend

      - name: Format check
        run: pixi run uv run --directory backend ruff format --check .

      - name: Audit dependencies
        run: pixi run uv run --directory backend pip-audit

      - name: Run tests
        env:
          ENV: test
          DATABASE_URL: "postgresql://sku_ops:testpass@localhost:5432/sku_ops_test"
          JWT_SECRET: ci-test-secret
          # Leave ANTHROPIC_API_KEY unset — conftest sets it to "" so
          # ANTHROPIC_AVAILABLE=False and no real API calls are made in tests.
        run: pixi run uv run --directory backend pytest --tb=short -q --timeout=60

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true

      - name: Verify dev tools resolve from pixi
        run: pixi run doctor

      - name: Install dependencies
        run: pixi run pnpm --dir frontend install --frozen-lockfile

      - name: Lint
        run: pixi run pnpm --dir frontend run lint

      - name: Format check
        run: pixi run pnpm --dir frontend run format:check

      - name: Build
        run: pixi run pnpm --dir frontend run build

      - name: Run tests
        run: pixi run pnpm --dir frontend run test:run
