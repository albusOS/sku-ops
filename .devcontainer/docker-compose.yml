services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - devcontainer-uv-cache:/root/.cache/uv
    environment:
      - PYTHONPATH=/workspace/backend
      - PYTHONUNBUFFERED=1
    command: sleep infinity
    ports:
      - "8000:8000"
      - "3000:3000"

volumes:
  devcontainer-uv-cache:
