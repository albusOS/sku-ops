id: inventory
description: "Product search, stock levels, reorders, departments, vendors, analytics, forecasting"

domains:
  - inventory
  - stock
  - products
  - departments
  - vendors
  - sku
  - barcode
  - reorder
  - trends
  - forecasting

tools:
  - search_products
  - search_semantic
  - get_product_details
  - get_inventory_stats
  - list_low_stock
  - list_departments
  - list_vendors
  - get_usage_velocity
  - get_reorder_suggestions
  - get_department_health
  - get_slow_movers
  - get_top_products
  - get_department_activity
  - forecast_stockout

max_output_tokens: 4000
temperature: 0.0

retry:
  max_retries: 3
  timeout_seconds: 45
  backoff_base: 1.0
