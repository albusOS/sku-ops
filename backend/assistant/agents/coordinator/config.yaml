id: coordinator
description: "Multi-domain coordinator — delegates to specialists for complex cross-domain queries"
tier: standard

domains:
  - general
  - dashboard
  - cross-domain
  - coordination

can_delegate_to:
  - inventory
  - ops
  - finance
  - insights

tools:
  - ask_inventory
  - ask_ops
  - ask_finance
  - ask_insights

thinking_budget: 0
max_output_tokens: 6000
temperature: 0.0

retry:
  max_retries: 2
  timeout_seconds: 90
  backoff_base: 1.0

canonical_queries:
  - "give me an overview of everything"
  - "how's the business doing overall"
  - "inventory health and financial summary"
  - "what needs attention across all areas"
