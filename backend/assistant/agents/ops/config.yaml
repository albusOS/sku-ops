id: ops
description: "Withdrawals, material requests, contractors, jobs, service addresses"
tier: standard

domains:
  - operations
  - withdrawals
  - contractors
  - jobs
  - material_requests
  - service_address

can_delegate_to: []

tools:
  - get_contractor_history
  - get_job_materials
  - list_recent_withdrawals
  - list_pending_material_requests

thinking_budget: 0
max_output_tokens: 4000
temperature: 0.0

retry:
  max_retries: 3
  timeout_seconds: 45
  backoff_base: 1.0

canonical_queries:
  - "what has john smith taken"
  - "pending material requests"
  - "recent withdrawals this week"
  - "materials for job 123"
  - "contractor withdrawal history"
  - "approve material request"
  - "who pulled materials today"
  - "show me all jobs"
  - "service address for a job"
  - "what was used on that project"
