# Agent model configuration — change here to swap models without touching agent code.
# Uses pydantic-ai model strings: "anthropic:<model>", "openrouter:<provider>/<model>", "openai:<model>", etc.
#
# Env overrides:
#   AGENT_PRIMARY_MODEL              — overrides primary (all agent tasks)
#   MODEL_REGISTRY_INFRA_SYNTHESIS   — overrides synthesis (history compression)
#   MODEL_REGISTRY_INFRA_CLASSIFIER  — overrides classifier (intent classification)
#
# Switching to OpenRouter: change prefix to "openrouter:anthropic/claude-sonnet-4-6"
# and add OPENROUTER_API_KEY to your .env.
#
# Cost profile:
#   primary    — Sonnet ($3 in / $15 out per M tokens) for all agent work
#   synthesis  — Haiku ($0.80 in / $4 out per M tokens) for history compression
#               and memory extraction (short prompts, simple summarisation)
#   classifier — Haiku for intent classification (short JSON responses, high volume)
primary: "anthropic:claude-sonnet-4-6"
synthesis: "anthropic:claude-haiku-4-5"
classifier: "anthropic:claude-haiku-4-5"
