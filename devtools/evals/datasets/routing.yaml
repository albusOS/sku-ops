# Routing eval dataset — tests that the unified agent uses the correct tools
# Tool names match the unified agent's registered tool functions.

# ── Trivial / conversational (no tools expected) ──────────────────────────────

- id: route-001
  input: "hi"
  assertions:
    - max_output_tokens: 200

- id: route-002
  input: "hello, how are you?"
  assertions:
    - max_output_tokens: 200

- id: route-003
  input: "what can you help me with?"
  assertions:
    - max_output_tokens: 500

# ── Lookup — inventory ────────────────────────────────────────────────────────

- id: route-010
  input: "do we have PVC pipes in stock?"
  assertions:
    - tool_called: search_skus
    - max_output_tokens: 600

- id: route-011
  input: "low stock items"
  assertions:
    - tool_called: list_low_stock
    - max_output_tokens: 1000

- id: route-012
  input: "how many products do we have?"
  assertions:
    - tool_called: get_inventory_stats
    - max_output_tokens: 400

- id: route-013
  input: "list our departments"
  assertions:
    - tool_called: list_departments
    - max_output_tokens: 600

- id: route-014
  input: "who are our vendors?"
  assertions:
    - tool_called: list_vendors
    - max_output_tokens: 600

# ── Lookup — operations ───────────────────────────────────────────────────────

- id: route-015
  input: "show me recent withdrawals this week"
  assertions:
    - tool_called: list_recent_withdrawals
    - max_output_tokens: 1000

- id: route-016
  input: "pending material requests"
  assertions:
    - tool_called: list_pending_material_requests
    - max_output_tokens: 1000

# ── Lookup — finance ──────────────────────────────────────────────────────────

- id: route-017
  input: "invoice summary"
  assertions:
    - tool_called: get_invoice_summary
    - max_output_tokens: 600

- id: route-018
  input: "what's our revenue this month?"
  assertions:
    - tool_called: get_pl_summary
    - max_output_tokens: 600

# ── Report — workflow tools ───────────────────────────────────────────────────

- id: route-020
  input: "give me a full inventory overview"
  assertions:
    - tool_called: run_inventory_overview
    - max_output_tokens: 3000

- id: route-021
  input: "weekly sales report"
  assertions:
    - tool_called: run_weekly_sales_report
    - max_output_tokens: 3000

# ── Sub-agent delegation ──────────────────────────────────────────────────────

- id: route-030
  input: "what products need reordering and why? analyze our procurement situation"
  assertions:
    - tool_called: analyze_procurement
    - max_output_tokens: 3000

- id: route-031
  input: "analyze our usage trends for the past month"
  assertions:
    - tool_called: analyze_trends
    - max_output_tokens: 3000
