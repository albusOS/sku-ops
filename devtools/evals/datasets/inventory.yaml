# Inventory eval dataset — tests unified agent inventory tool coverage.
# All tool names match the unified agent's registered tool functions.

- id: inv-001
  input: "do we have PVC pipes?"
  assertions:
    - tool_called: search_skus
    - response_contains: ["PVC"]
    - max_output_tokens: 800

- id: inv-002
  input: "full inventory overview"
  assertions:
    - tool_called: run_inventory_overview
    - max_output_tokens: 3000

- id: inv-003
  input: "what products are low on stock?"
  assertions:
    - tool_called: list_low_stock
    - max_output_tokens: 1200

- id: inv-004
  input: "how many products do we carry?"
  assertions:
    - tool_called: get_inventory_stats
    - no_bare_units: true
    - max_output_tokens: 500

- id: inv-005
  input: "list all departments"
  assertions:
    - tool_called: list_departments
    - max_output_tokens: 800

- id: inv-006
  input: "who are our suppliers / vendors?"
  assertions:
    - tool_called: list_vendors
    - max_output_tokens: 600

- id: inv-007
  input: "search for copper fittings"
  assertions:
    - tool_called: search_skus
    - max_output_tokens: 800

- id: inv-008
  input: "what should we reorder? give me recommendations"
  assertions:
    - tool_called: analyze_procurement
    - max_output_tokens: 2500
