[workspace]
name = "sku-ops"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = "3.13.*"
uv = ">=0.7"
nodejs = "20.*"
pnpm = ">=9"

[activation]
env = { UV_PYTHON_DOWNLOADS = "never", UV_PYTHON_PREFERENCE = "only-system" }

[tasks.doctor]
cmd = "bash devtools/scripts/pixi_toolchain_doctor.sh"
description = "Verify python, uv, node, pnpm resolve from pixi and uv targets pixi Python"

[tasks._ensure-db]
cmd = "bash devtools/scripts/ensure_supabase_running.sh"
description = "Ensure local Supabase stack is running"

[tasks.db]
cmd = "supabase start && echo 'Supabase started. Run supabase status for URLs.'"
description = "Start local Supabase stack"

[tasks.db-stop]
cmd = "supabase stop"
description = "Stop local Supabase stack"

[tasks.db-reset]
depends-on = ["_ensure-db"]
cmd = "supabase db reset --local --yes"
description = "Reset local DB from migrations and seeds"

[tasks.backend]
depends-on = ["_ensure-db"]
cmd = "uv run --directory backend uvicorn server:app --reload --host 0.0.0.0 --port 8000 --app-dir ."
env = { PYTHONPATH = ".:..", DATABASE_URL = "postgresql://postgres:postgres@127.0.0.1:54322/postgres" }
description = "Start backend dev server (FastAPI)"

[tasks.frontend]
depends-on = ["_ensure-db"]
cmd = "bash devtools/scripts/run_frontend_dev.sh"
description = "Start frontend dev server (Vite)"

[tasks.dev]
depends-on = ["_ensure-db"]
cmd = "bash devtools/scripts/run_dev_stack.sh"
description = "Start backend and frontend dev servers together"

[tasks.tests]
description = "Tests: all (default: backend + frontend + e2e), or backend | frontend | e2e. Pytest-only: pixi run tests backend -- -- … (not with target all). Playwright: pixi run tests e2e -- -- …"
args = [{ arg = "target", default = "all", choices = ["all", "backend", "frontend", "e2e"] }]
env = { PYTHONPATH = ".:..", DATABASE_URL = "postgresql://postgres:postgres@127.0.0.1:54322/postgres" }
cmd = "{% if target == \"frontend\" %}pnpm --dir frontend run test:run{% elif target == \"backend\" %}pixi run db-reset && uv run --directory backend pytest{% elif target == \"e2e\" %}pixi run _ensure-db && cd e2e && pnpm install --frozen-lockfile && pnpx playwright test{% else %}pixi run db-reset && uv run --directory backend pytest && pnpm --dir frontend run test:run && cd e2e && pnpm install --frozen-lockfile && pnpx playwright test{% endif %}"

[tasks.lint]
description = "Lint: all (default), backend (ruff), or frontend (ESLint). Usage: pixi run lint [all|backend|frontend]"
args = [{ arg = "target", default = "all", choices = ["all", "backend", "frontend"] }]
cmd = "{% if target == \"all\" %}uv run --directory backend ruff check . --no-fix && pnpm --dir frontend run lint{% elif target == \"backend\" %}uv run --directory backend ruff check . --no-fix{% else %}pnpm --dir frontend run lint{% endif %}"

[tasks.format]
description = "Format: all (default), backend (ruff), or frontend (Prettier). Usage: pixi run format [all|backend|frontend]"
args = [{ arg = "target", default = "all", choices = ["all", "backend", "frontend"] }]
cmd = "{% if target == \"all\" %}uv run --directory backend ruff format . && pnpm --dir frontend run format{% elif target == \"backend\" %}uv run --directory backend ruff format .{% else %}pnpm --dir frontend run format{% endif %}"

[tasks.check]
description = "Lint then format: all (default), backend only, or frontend only. Usage: pixi run check [all|backend|frontend]"
args = [{ arg = "target", default = "all", choices = ["all", "backend", "frontend"] }]
depends-on = [
  { task = "lint", args = ["{{ target }}"] },
  { task = "format", args = ["{{ target }}"] },
]
cmd = "true"

[tasks.commit]
cmd = "uv run --directory backend cz commit"
description = "Commitizen conventional commit"

[tasks.container]
cmd = "docker-compose up -d"
cwd = ".devcontainer"
description = "Start devcontainer (docker-compose)"

[tasks.provision]
depends-on = ["_ensure-db"]
cmd = "uv run --directory backend python -m devtools.scripts.provision"
env = { PYTHONPATH = ".:.." }
description = "Provision hint / devtools provision entrypoint"

[tasks.import]
depends-on = ["_ensure-db"]
cmd = "uv run --directory backend python -m devtools.scripts.import_hike"
env = { PYTHONPATH = ".:.." }
description = "Import Hike POS data (e.g. --vendors --products)"

[tasks.eval]
cmd = "uv run --directory backend python -m devtools.evals"
env = { PYTHONPATH = ".:.." }
description = "Run LLM evals"

[tasks.create-admin]
cmd = "uv run --directory backend python scripts/create_admin.py"
env = { PYTHONPATH = ".:.." }
description = "Create or update admin user in DB"

[tasks.verify]
cmd = "uv run --directory backend python scripts/verify_deploy.py"
env = { PYTHONPATH = ".:.." }
description = "Pre-deploy verification"

[tasks.clean]
cmd = "bash devtools/scripts/clean_repo.sh"
description = "Remove local Python caches and backend venv"
